<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="mapbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1e35"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a42"/>
      <stop offset="100%" stop-color="#131f33"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b68ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="img1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5c"/>
      <stop offset="100%" stop-color="#0f2a44"/>
    </linearGradient>
    <linearGradient id="img2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1e1a4a"/>
    </linearGradient>
  </defs>

  <!-- Map background -->
  <rect width="800" height="450" fill="url(#mapbg)"/>

  <!-- Map grid/roads -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#1e3a5c" stroke-width="12"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#1e3a5c" stroke-width="8"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#1e3a5c" stroke-width="10"/>
  <line x1="450" y1="0" x2="450" y2="450" stroke="#1e3a5c" stroke-width="14"/>
  <line x1="650" y1="0" x2="650" y2="450" stroke="#1e3a5c" stroke-width="8"/>
  <line x1="0" y1="370" x2="450" y2="370" stroke="#1e3a5c" stroke-width="6"/>
  <line x1="100" y1="0" x2="100" y2="150" stroke="#1e3a5c" stroke-width="6"/>
  <line x1="320" y1="150" x2="320" y2="280" stroke="#1e3a5c" stroke-width="6"/>

  <!-- Blocks / buildings -->
  <rect x="20" y="20" width="70" height="120" rx="4" fill="#112236" opacity="0.8"/>
  <rect x="100" y="40" width="90" height="100" rx="4" fill="#0e1e30" opacity="0.8"/>
  <rect x="210" y="20" width="100" height="120" rx="4" fill="#112236" opacity="0.8"/>
  <rect x="320" y="60" width="120" height="80" rx="4" fill="#0e1e30" opacity="0.8"/>
  <rect x="460" y="20" width="80" height="120" rx="4" fill="#112236" opacity="0.8"/>
  <rect x="550" y="40" width="90" height="100" rx="4" fill="#0e1e30" opacity="0.8"/>
  <rect x="660" y="20" width="130" height="120" rx="4" fill="#112236" opacity="0.8"/>
  <!-- Bottom blocks -->
  <rect x="20" y="160" width="170" height="110" rx="4" fill="#0e1e30" opacity="0.8"/>
  <rect x="210" y="160" width="230" height="110" rx="4" fill="#112236" opacity="0.8"/>
  <rect x="460" y="160" width="180" height="110" rx="4" fill="#0e1e30" opacity="0.8"/>
  <rect x="660" y="160" width="130" height="110" rx="4" fill="#112236" opacity="0.8"/>
  <rect x="20" y="290" width="170" height="70" rx="4" fill="#112236" opacity="0.8"/>
  <rect x="210" y="290" width="230" height="70" rx="4" fill="#0e1e30" opacity="0.8"/>
  <rect x="460" y="290" width="180" height="70" rx="4" fill="#112236" opacity="0.8"/>
  <rect x="660" y="290" width="130" height="70" rx="4" fill="#0e1e30" opacity="0.8"/>
  <rect x="20" y="380" width="170" height="60" rx="4" fill="#0e1e30" opacity="0.8"/>
  <rect x="210" y="380" width="230" height="60" rx="4" fill="#112236" opacity="0.8"/>
  <rect x="460" y="380" width="380" height="60" rx="4" fill="#0e1e30" opacity="0.8"/>

  <!-- Map pins -->
  <!-- Pin 1 (selected) -->
  <circle cx="260" cy="200" r="22" fill="#7b68ee" opacity="0.2"/>
  <circle cx="260" cy="196" r="14" fill="#7b68ee"/>
  <circle cx="260" cy="196" r="6" fill="white"/>
  <path d="M260 210 L255 218 L260 215 L265 218 Z" fill="#7b68ee"/>
  <!-- Pin price bubble -->
  <rect x="220" y="144" width="80" height="28" rx="14" fill="#7b68ee"/>
  <text x="260" y="163" font-family="monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">$285,000</text>
  <path d="M253 172 L260 178 L267 172" fill="#7b68ee"/>

  <!-- Pin 2 -->
  <circle cx="520" cy="110" r="12" fill="#10b981"/>
  <circle cx="520" cy="110" r="5" fill="white"/>
  <path d="M520 122 L516 128 L520 126 L524 128 Z" fill="#10b981"/>
  <rect x="482" y="76" width="76" height="24" rx="12" fill="#10b981"/>
  <text x="520" y="92" font-family="monospace" font-size="10" font-weight="bold" fill="white" text-anchor="middle">$175,000</text>

  <!-- Pin 3 -->
  <circle cx="370" cy="330" r="12" fill="#f59e0b"/>
  <circle cx="370" cy="330" r="5" fill="white"/>
  <path d="M370 342 L366 348 L370 346 L374 348 Z" fill="#f59e0b"/>
  <rect x="328" y="296" width="84" height="24" rx="12" fill="#f59e0b"/>
  <text x="370" y="312" font-family="monospace" font-size="10" font-weight="bold" fill="white" text-anchor="middle">$420,000</text>

  <!-- Pin 4 -->
  <circle cx="700" cy="240" r="10" fill="#06b6d4"/>
  <circle cx="700" cy="240" r="4" fill="white"/>
  <path d="M700 250 L696 256 L700 254 L704 256 Z" fill="#06b6d4"/>

  <!-- Scale indicator -->
  <rect x="30" y="420" width="80" height="4" rx="2" fill="#7b68ee" opacity="0.5"/>
  <rect x="30" y="418" width="1" height="8" fill="#7b68ee" opacity="0.5"/>
  <rect x="110" y="418" width="1" height="8" fill="#7b68ee" opacity="0.5"/>
  <text x="70" y="436" font-size="9" fill="#94a3b8" text-anchor="middle" opacity="0.6">500m</text>

  <!-- Search/filter overlay top -->
  <rect x="0" y="0" width="800" height="46" fill="#0a1628" opacity="0.9"/>
  <!-- Logo -->
  <rect x="16" y="13" width="28" height="20" rx="6" fill="#7b68ee" opacity="0.9"/>
  <text x="30" y="27" font-size="10" fill="white" text-anchor="middle">🏠</text>
  <rect x="52" y="18" width="60" height="10" rx="5" fill="#7b68ee" opacity="0.7"/>
  <!-- Search input -->
  <rect x="130" y="10" width="280" height="26" rx="13" fill="#112236" stroke="#7b68ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="148" cy="23" r="6" fill="none" stroke="#64748b" stroke-width="1.2"/>
  <line x1="152" y1="27" x2="156" y2="31" stroke="#64748b" stroke-width="1.2"/>
  <rect x="162" y="20" width="130" height="6" rx="3" fill="#64748b" opacity="0.3"/>
  <!-- Filters -->
  <rect x="420" y="10" width="60" height="26" rx="13" fill="#112236"/>
  <rect x="430" y="20" width="40" height="6" rx="3" fill="#64748b" opacity="0.4"/>
  <rect x="490" y="10" width="70" height="26" rx="13" fill="#112236"/>
  <rect x="500" y="20" width="50" height="6" rx="3" fill="#64748b" opacity="0.4"/>
  <rect x="570" y="10" width="80" height="26" rx="13" fill="#7b68ee" opacity="0.15"/>
  <rect x="580" y="20" width="60" height="6" rx="3" fill="#7b68ee" opacity="0.6"/>
  <!-- Map/List toggle -->
  <rect x="698" y="10" width="88" height="26" rx="13" fill="#112236"/>
  <rect x="704" y="12" width="38" height="22" rx="11" fill="#7b68ee" opacity="0.8"/>
  <rect x="714" y="20" width="18" height="6" rx="3" fill="white" opacity="0.9"/>
  <rect x="750" y="20" width="28" height="6" rx="3" fill="#64748b" opacity="0.4"/>

  <!-- Property detail card -->
  <rect x="580" y="190" width="210" height="246" rx="16" fill="url(#card)" stroke="#7b68ee" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Property image -->
  <rect x="592" y="200" width="186" height="105" rx="10" fill="url(#img1)"/>
  <!-- House illustration -->
  <polygon points="685,230 640,260 730,260" fill="#1e4a7c" opacity="0.8"/>
  <rect x="651" y="260" width="68" height="45" fill="#1e4a7c" opacity="0.6"/>
  <rect x="671" y="275" width="18" height="30" fill="#0a1628" opacity="0.7"/>
  <rect x="656" y="268" width="14" height="14" fill="#0a1628" opacity="0.6"/>
  <circle cx="730" cy="245" r="12" fill="#f59e0b" opacity="0.3"/>
  <circle cx="730" cy="245" r="6" fill="#f59e0b" opacity="0.6"/>
  <!-- Photo badge -->
  <rect x="592" y="200" width="46" height="20" rx="10" fill="#0a1628" opacity="0.85"/>
  <text x="615" y="213" font-size="9" fill="#94a3b8" text-anchor="middle">📷 12</text>
  <!-- 3D badge -->
  <rect x="724" y="200" width="54" height="20" rx="10" fill="#7b68ee" opacity="0.85"/>
  <rect x="732" y="206" width="38" height="8" rx="4" fill="white" opacity="0.9"/>
  <!-- Property info -->
  <rect x="596" y="316" width="140" height="8" rx="4" fill="#e2e8f0" opacity="0.85"/>
  <rect x="596" y="330" width="90" height="6" rx="3" fill="#94a3b8" opacity="0.4"/>
  <!-- Price -->
  <rect x="596" y="346" width="100" height="12" rx="6" fill="#7b68ee" opacity="0.15"/>
  <rect x="604" y="350" width="84" height="4" rx="2" fill="#7b68ee" opacity="0.9"/>
  <!-- Features row -->
  <rect x="596" y="366" width="186" height="1" fill="#ffffff" opacity="0.05"/>
  <text x="606" y="384" font-size="10" fill="#94a3b8">🛏️</text>
  <rect x="622" y="378" width="16" height="6" rx="3" fill="#94a3b8" opacity="0.5"/>
  <text x="652" y="384" font-size="10" fill="#94a3b8">🚿</text>
  <rect x="668" y="378" width="16" height="6" rx="3" fill="#94a3b8" opacity="0.5"/>
  <text x="698" y="384" font-size="10" fill="#94a3b8">📐</text>
  <rect x="714" y="378" width="36" height="6" rx="3" fill="#94a3b8" opacity="0.5"/>
  <!-- CTA button -->
  <rect x="596" y="394" width="184" height="34" rx="10" fill="url(#purple)"/>
  <rect x="634" y="407" width="108" height="8" rx="4" fill="white" opacity="0.95"/>

  <!-- Compass -->
  <circle cx="65" cy="390" r="26" fill="#112236" opacity="0.85" stroke="#7b68ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="65" y="380" font-size="8" fill="#ef4444" text-anchor="middle" font-weight="bold">N</text>
  <text x="65" y="402" font-size="8" fill="#94a3b8" text-anchor="middle">S</text>
  <text x="80" y="394" font-size="8" fill="#94a3b8" text-anchor="middle">E</text>
  <text x="50" y="394" font-size="8" fill="#94a3b8" text-anchor="middle">W</text>
  <line x1="65" y1="384" x2="65" y2="374" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="65" y1="398" x2="65" y2="406" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
</svg>
