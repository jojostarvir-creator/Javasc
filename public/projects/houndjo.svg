<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0608"/>
      <stop offset="100%" style="stop-color:#1a0e14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#f5e06e"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a22"/>
      <stop offset="100%" style="stop-color:#1a0e14"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="200" cy="220" rx="180" ry="140" fill="#d4af37" opacity="0.04" filter="url(#softblur)"/>
  <ellipse cx="600" cy="200" rx="180" ry="140" fill="#8b1a4a" opacity="0.06" filter="url(#softblur)"/>

  <!-- Nav bar -->
  <rect x="0" y="0" width="800" height="44" fill="#0a0608" opacity="0.9"/>
  <text x="36" y="28" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#d4af37" letter-spacing="3">HOUNDJO</text>
  <text x="200" y="27" font-family="Arial, sans-serif" font-size="9" fill="#9a8a7a" opacity="0.7">Boutique</text>
  <text x="265" y="27" font-family="Arial, sans-serif" font-size="9" fill="#9a8a7a" opacity="0.7">Collection</text>
  <text x="338" y="27" font-family="Arial, sans-serif" font-size="9" fill="#9a8a7a" opacity="0.7">À propos</text>
  <text x="400" y="27" font-family="Arial, sans-serif" font-size="9" fill="#9a8a7a" opacity="0.7">Contact</text>
  <rect x="690" y="12" width="80" height="20" rx="10" fill="none" stroke="#d4af37" stroke-width="1"/>
  <text x="730" y="26" font-family="Arial, sans-serif" font-size="8" fill="#d4af37" text-anchor="middle" letter-spacing="1">COMMANDER</text>

  <!-- Decorative line -->
  <line x1="0" y1="44" x2="800" y2="44" stroke="#d4af37" stroke-width="0.5" opacity="0.3"/>

  <!-- Perfume bottle 1 (center-left) -->
  <g transform="translate(220, 100)">
    <!-- Bottle body -->
    <rect x="-28" y="60" width="56" height="120" rx="8" fill="url(#bottle)" stroke="#d4af37" stroke-width="0.8" opacity="0.9"/>
    <!-- Bottle shoulder -->
    <path d="M-20,60 Q-28,40 -16,30 L16,30 Q28,40 20,60 Z" fill="url(#bottle)" stroke="#d4af37" stroke-width="0.8" opacity="0.9"/>
    <!-- Bottle neck -->
    <rect x="-8" y="14" width="16" height="18" rx="3" fill="#1a0e14" stroke="#d4af37" stroke-width="0.8"/>
    <!-- Cap -->
    <rect x="-12" y="6" width="24" height="10" rx="3" fill="#d4af37" opacity="0.9"/>
    <!-- Label -->
    <rect x="-20" y="80" width="40" height="50" rx="3" fill="#d4af37" opacity="0.08" stroke="#d4af37" stroke-width="0.5"/>
    <text x="0" y="100" font-family="Georgia, serif" font-size="7" fill="#d4af37" text-anchor="middle" opacity="0.8">MUSC</text>
    <text x="0" y="113" font-family="Georgia, serif" font-size="5" fill="#d4af37" text-anchor="middle" opacity="0.6">HOUNDJO</text>
    <!-- Shine -->
    <line x1="-14" y1="65" x2="-14" y2="165" stroke="white" stroke-width="1.5" opacity="0.06"/>
  </g>

  <!-- Perfume bottle 2 (center, taller) -->
  <g transform="translate(340, 70)">
    <rect x="-22" y="70" width="44" height="150" rx="6" fill="url(#bottle)" stroke="#d4af37" stroke-width="1" opacity="0.95"/>
    <path d="M-16,70 Q-22,50 -12,36 L12,36 Q22,50 16,70 Z" fill="url(#bottle)" stroke="#d4af37" stroke-width="1" opacity="0.95"/>
    <rect x="-7" y="18" width="14" height="20" rx="3" fill="#1a0e14" stroke="#d4af37" stroke-width="0.8"/>
    <rect x="-11" y="8" width="22" height="12" rx="4" fill="#d4af37"/>
    <rect x="-16" y="90" width="32" height="65" rx="3" fill="#d4af37" opacity="0.08" stroke="#d4af37" stroke-width="0.5"/>
    <text x="0" y="115" font-family="Georgia, serif" font-size="8" fill="#d4af37" text-anchor="middle" opacity="0.9">OUD</text>
    <text x="0" y="128" font-family="Georgia, serif" font-size="5.5" fill="#d4af37" text-anchor="middle" opacity="0.7">PARFUM</text>
    <line x1="-10" y1="75" x2="-10" y2="210" stroke="white" stroke-width="2" opacity="0.07"/>
    <!-- Glow around center bottle -->
    <ellipse cx="0" cy="150" rx="30" ry="15" fill="#d4af37" opacity="0.06" filter="url(#softblur)"/>
  </g>

  <!-- Perfume bottle 3 (center-right, round) -->
  <g transform="translate(460, 110)">
    <ellipse cx="0" cy="130" rx="34" ry="52" fill="url(#bottle)" stroke="#d4af37" stroke-width="0.8" opacity="0.9"/>
    <rect x="-7" y="65" width="14" height="20" rx="3" fill="#1a0e14" stroke="#d4af37" stroke-width="0.8"/>
    <ellipse cx="0" cy="62" rx="10" ry="6" fill="#d4af37" opacity="0.8"/>
    <text x="0" y="126" font-family="Georgia, serif" font-size="7" fill="#d4af37" text-anchor="middle" opacity="0.8">ROSE</text>
    <text x="0" y="139" font-family="Georgia, serif" font-size="5" fill="#d4af37" text-anchor="middle" opacity="0.6">BÉNIN</text>
    <line x1="-16" y1="80" x2="-16" y2="160" stroke="white" stroke-width="1.5" opacity="0.06"/>
  </g>

  <!-- Badge -->
  <rect x="280" y="62" width="240" height="18" rx="9" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.4"/>
  <text x="400" y="75" font-family="Arial, sans-serif" font-size="8" fill="#d4af37" text-anchor="middle" letter-spacing="2" opacity="0.8">✦  PARFUMS DU BÉNIN  ✦</text>

  <!-- Right side text -->
  <text x="640" y="155" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">Houndjo</text>
  <text x="640" y="180" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#d4af37" text-anchor="middle">Muscs &amp; Huiles Parfumées</text>
  <line x1="580" y1="195" x2="700" y2="195" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>
  <text x="640" y="215" font-family="Arial, sans-serif" font-size="9" fill="#9a8a7a" text-anchor="middle">Fabriqués artisanalement au Bénin</text>
  <text x="640" y="232" font-family="Arial, sans-serif" font-size="9" fill="#9a8a7a" text-anchor="middle">pour une expérience olfactive unique.</text>

  <!-- CTA button -->
  <rect x="580" y="255" width="120" height="32" rx="16" fill="#d4af37"/>
  <text x="640" y="275" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#0a0608" text-anchor="middle" letter-spacing="1">DÉCOUVRIR</text>

  <!-- Star decoration -->
  <text x="640" y="320" font-family="Arial, sans-serif" font-size="11" fill="#d4af37" text-anchor="middle" opacity="0.4">✦ ✦ ✦</text>

  <!-- URL bar at bottom -->
  <rect x="0" y="415" width="800" height="35" fill="#0a0608" opacity="0.8"/>
  <text x="400" y="436" font-family="monospace" font-size="9" fill="#9a8a7a" text-anchor="middle" opacity="0.6">muskhoundjo.vercel.app</text>
</svg>
