<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2010"/>
      <stop offset="100%" style="stop-color:#1a3a1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c518;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f5c518;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Glow blob top center -->
  <ellipse cx="400" cy="100" rx="300" ry="120" fill="#f5c518" opacity="0.06" filter="url(#blur)"/>

  <!-- Nav bar mockup -->
  <rect x="0" y="0" width="800" height="48" fill="#0a1a0a" opacity="0.8"/>
  <!-- Logo circle -->
  <circle cx="36" cy="24" r="14" fill="#f5c518"/>
  <text x="36" y="29" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#0d2010" text-anchor="middle">C</text>
  <!-- Logo text -->
  <text x="58" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f5c518" letter-spacing="2">COCON</text>
  <text x="58" y="33" font-family="Arial, sans-serif" font-size="7" fill="#a0c878" letter-spacing="1.5">GASTRONOMIE AFRICAINE</text>
  <!-- Nav items -->
  <text x="220" y="28" font-family="Arial, sans-serif" font-size="9" fill="#c8d8b8" opacity="0.7">Accueil</text>
  <text x="290" y="28" font-family="Arial, sans-serif" font-size="9" fill="#c8d8b8" opacity="0.7">Menu</text>
  <text x="340" y="28" font-family="Arial, sans-serif" font-size="9" fill="#c8d8b8" opacity="0.7">Boissons</text>
  <text x="400" y="28" font-family="Arial, sans-serif" font-size="9" fill="#c8d8b8" opacity="0.7">Galerie</text>
  <text x="456" y="28" font-family="Arial, sans-serif" font-size="9" fill="#c8d8b8" opacity="0.7">Réservation</text>
  <!-- Reserve button -->
  <rect x="690" y="13" width="90" height="22" rx="11" fill="#f5c518"/>
  <text x="735" y="28" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#0d2010" text-anchor="middle" letter-spacing="0.5">RÉSERVER</text>

  <!-- Badge -->
  <rect x="270" y="80" width="260" height="24" rx="12" fill="none" stroke="#f5c518" stroke-width="1" opacity="0.5"/>
  <text x="400" y="96" font-family="Arial, sans-serif" font-size="9" fill="#f5c518" text-anchor="middle" letter-spacing="2">★  HAUTE GASTRONOMIE AFRICAINE  ★</text>

  <!-- Main headline -->
  <text x="400" y="160" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="bold" fill="white" text-anchor="middle">Le goût</text>
  <text x="400" y="215" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-style="italic" fill="#f5c518" text-anchor="middle">authentique</text>
  <text x="400" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="bold" fill="white" text-anchor="middle">de l'Afrique</text>

  <!-- Subtitle -->
  <text x="400" y="315" font-family="Arial, sans-serif" font-size="12" fill="#a0c878" text-anchor="middle" opacity="0.8">Cuisine africaine raffinée · Ingrédients frais · Modernité internationale</text>

  <!-- CTA Buttons -->
  <rect x="198" y="340" width="170" height="38" rx="19" fill="#2d6a2d"/>
  <text x="283" y="364" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="0.5">✦ DÉCOUVRIR LE MENU</text>

  <rect x="384" y="340" width="168" height="38" rx="19" fill="#f5c518"/>
  <text x="468" y="364" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d2010" text-anchor="middle" letter-spacing="0.5">⊡ RÉSERVER UNE TABLE</text>

  <!-- Bottom gradient fade -->
  <rect x="0" y="380" width="800" height="70" fill="url(#bg)" opacity="0.7"/>
</svg>
